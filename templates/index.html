<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>영수증 프린터</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>🧾 사진 출력</h1>

  <!-- 방법 1: 사진 파일 선택 / 기본 카메라로 촬영 -->
  <section class="card">
    <h2>사진 선택 / 촬영</h2>
    <label class="btn" for="file">사진 고르기</label>
    <input id="file" type="file" accept="image/*" hidden>
    <p class="hint">누르면 "사진 보관함 / 사진 찍기 / 파일 선택" 중에 고를 수 있어요.</p>
  </section>

  <!-- 방법 2: 웹페이지 내 실시간 카메라 (HTTPS 필요) -->
  <section class="card">
    <h2>실시간 카메라</h2>
    <video id="video" autoplay playsinline muted></video>
    <div class="row">
      <button id="capture" class="btn">촬영해서 출력</button>
      <button id="flip" class="btn ghost">카메라 전환</button>
    </div>
    <p id="camErr" class="hint err" hidden></p>
  </section>

  <canvas id="canvas" hidden></canvas>

  <!-- 목 모드 출력 미리보기 (실제 인쇄 결과와 동일한 1비트 이미지) -->
  <section id="previewCard" class="card" hidden>
    <h2>출력 미리보기</h2>
    <img id="preview" alt="출력 미리보기">
  </section>

  <div id="status" class="status" hidden></div>

  <script src="/static/app.js"></script>
</body>
</html>
